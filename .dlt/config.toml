# DuckLake destination config
# NOTE: credentials (catalog connection string, S3 keys) are in .env.secrets
# Only non-secret config goes here
[destination.ducklake]
ducklake_name = "lake"


# NOTE: DuckDB/DuckLake connection settings (memory_limit, threads, retry)
# are in .env.secrets as DESTINATION__DUCKLAKE__CREDENTIALS__GLOBAL_CONFIG__*

# Extract: each container runs ONE dataset, so workers=1 is correct.
# max_parallel_items controls concurrent dlt.defer() page fetches.
[extract]
workers = 1
max_parallel_items = 10

[extract.data_writer]
file_max_items = 50000
buffer_max_items = 2000

# Normalize: reduce workers to limit memory
[normalize]
workers = 2

[normalize.data_writer]
file_max_items = 100000
file_max_bytes = 134217728

# Load: reduce from 20 to 4 — each worker opens a DuckLake connection
# that loads the full catalog (986 tables) into memory
[load]
workers = 4

# Schema: allow new columns to be added as nullable (DuckLake can't ADD COLUMN with constraints)
[schema_contract]
columns = "evolve"
data_type = "evolve"

# Runtime
[runtime]
log_level = "INFO"
request_max_attempts = 5
request_backoff_factor = 1
request_timeout = 120
request_max_retry_delay = 30
