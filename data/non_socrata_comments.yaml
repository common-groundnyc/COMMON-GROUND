  columns:
    unique_id: "Row-level unique identifier"
    last_name: "Standardized last name"
    first_name: "Standardized first name"
    source_table: "Original schema.table where this name was found"
    dm_last: "Double metaphone encoding of last name (phonetic blocking)"
