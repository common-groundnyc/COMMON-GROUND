# Non-Socrata table descriptions for DuckLake COMMENT ON statements.
# Generated from source file analysis. Used by the comment-applier asset.

# ── CourtListener ────────────────────────────────────────────────────────────
- schema: federal
  table: cl_judges
  comment: "Federal and state judges from CourtListener. One row per judge with biographical data."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/people/
  columns:
    name_full: "Full name of the judge"
    date_dob: "Date of birth"
    date_dod: "Date of death, if applicable"

- schema: federal
  table: cl_judges__aba_ratings
  comment: "Child table of cl_judges. ABA (American Bar Association) qualification ratings for judicial nominees."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/people/

- schema: federal
  table: cl_judges__educations
  comment: "Child table of cl_judges. Educational history including school name and degree."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/people/

- schema: federal
  table: cl_judges__political_affiliations
  comment: "Child table of cl_judges. Political party affiliations of judges."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/people/

- schema: federal
  table: cl_judges__positions
  comment: "Child table of cl_judges. Judicial appointments, courts served, and nomination details."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/people/

- schema: federal
  table: cl_judges__race
  comment: "Child table of cl_judges. Race/ethnicity classifications of judges."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/people/

- schema: federal
  table: cl_judges__sources
  comment: "Child table of cl_judges. Citation sources for judge biographical data."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/people/

- schema: federal
  table: cl_courts
  comment: "Federal and state courts from CourtListener. One row per court with jurisdiction info."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/courts/

- schema: federal
  table: cl_courts__appeals_to
  comment: "Child table of cl_courts. Maps each court to its appellate court(s)."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/courts/

- schema: federal
  table: cl_financial_disclosures
  comment: "Federal judge financial disclosures from CourtListener. Annual filings with assets, income, liabilities."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/financial-disclosures/

- schema: federal
  table: cl_financial_disclosures__agreements
  comment: "Child table of cl_financial_disclosures. Agreements or arrangements reported by judges."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/financial-disclosures/

- schema: federal
  table: cl_financial_disclosures__debts
  comment: "Child table of cl_financial_disclosures. Debts owed by judges above reporting threshold."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/financial-disclosures/

- schema: federal
  table: cl_financial_disclosures__gifts
  comment: "Child table of cl_financial_disclosures. Gifts received by judges above reporting threshold."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/financial-disclosures/

- schema: federal
  table: cl_financial_disclosures__investments
  comment: "Child table of cl_financial_disclosures. Investment holdings and transactions reported by judges."
  source: CourtListener API
  source_url: https://www.courtlistener.com/api/rest/v4/financial-disclosures/

- schema: federal
  table: cl_financial_disclosures__non_investment_incomes
  comment: "Child table of cl_financial_disclosures. Non-investment income (speaking fees, teaching, etc.)."
