    borough: "Borough name or code. 1=Manhattan, 2=Bronx, 3=Brooklyn, 4=Queens, 5=SI"
    bbl: "10-digit Borough-Block-Lot identifier. Join to any BBL-keyed table."

- schema: business
  table: bic_trade_waste
  comment: "BIC-licensed trade waste haulers. Companies authorized to collect commercial garbage in NYC."
  source: Socrata
  columns:
    bbl: "10-digit Borough-Block-Lot identifier. Join to any BBL-keyed table."
    boro: "Borough: 1=Manhattan, 2=Bronx, 3=Brooklyn, 4=Queens, 5=Staten Island"
    created: "Timestamp of when data is processed for OpenData"
    bic_number: "BIC File Number of the Entity"
    account_name: "Name of Entity"
    application_type: "Class of Trade Waste Application"

- schema: business
