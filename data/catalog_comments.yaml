# Catalog of all tables in the NYC open data lake (DuckLake).
# Generated for LLM-optimized SQL generation.
# 391 total entries: Socrata + non-Socrata (federal, census, CourtListener, etc.).
# Format: schema, table, comment (1-2 sentences), source, key columns.
# BBL = 10-digit Borough(1)+Block(5)+Lot(4). Example: 1000670001
# Borough codes: 1=Manhattan, 2=Bronx, 3=Brooklyn, 4=Queens, 5=Staten Island

# --- BUSINESS ---
- schema: business
  table: acris_pp_parties
  comment: "ACRIS personal property document parties. Liens on business assets. One row per party per document."
  source: Socrata
  columns:
    document_id: "Document Identifier"
    record_type: "P for Parties Record"
    party_type: "Party type code"
    name: "Name of party (last name, first name MI)"
    address_1: "Name attention/address of party"
    zip: "Zip code of party"

- schema: business
  table: bic_denied_companies
  comment: "BIC-denied trade waste and wholesale market companies. Entities denied or revoked from operating in NYC."
  source: Socrata
