# --- FOUNDATION ---
- schema: foundation
  table: data_health
  comment: "Per-table health profile for all lake tables. Row counts, null rates, profiled after each ingestion run."
  source: Computed (DuckDB SQL)
  columns:
    schema_name: "Source schema name"
    table_name: "Source table name"
    row_count: "Total row count"
    high_null_columns: "Number of columns with >50% null rate"
    profiled_at: "Timestamp of last profiling run"

- schema: foundation
  table: h3_index
  comment: "H3 hex cell spatial index (resolution 9, ~100m) for all lat/lng tables in the lake. NYC bounds only."
  source: Computed (DuckDB H3 extension)
  columns:
    source_table: "Original schema.table containing the lat/lng"
    h3_res9: "H3 cell ID at resolution 9"
    lat: "Latitude"
    lng: "Longitude"

- schema: foundation
  table: phonetic_index
  comment: "Double metaphone phonetic encodings for all names in name_index. Used for fuzzy name blocking in Splink."
  source: Computed (DuckDB splink_udfs extension)
  columns:
    dm_last: "Double metaphone encoding of last name"
    dm_first: "Double metaphone encoding of first name"
    sx_last: "Soundex encoding of last name"
    sx_first: "Soundex encoding of first name"

- schema: foundation
  table: row_fingerprints
  comment: "MurmurHash3 fingerprints of high-volume tables for dedup detection. Covers HPD, DOB, 311, NYPD, health."
  source: Computed (DuckDB hashfuncs extension)
  columns:
    source_table: "Original schema.table that was fingerprinted"
    record_key: "Primary key value from the source table"
    fingerprint: "128-bit MurmurHash3 of the record key"
