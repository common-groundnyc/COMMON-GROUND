services:
  postgres:
    image: postgres:16-alpine
    command: ["-c", "ssl=on", "-c", "ssl_cert_file=/var/lib/postgresql/server.crt", "-c", "ssl_key_file=/var/lib/postgresql/server.key"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dagster
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /opt/postgres-ssl/server.crt:/var/lib/postgresql/server.crt:ro
      - /opt/postgres-ssl/server.key:/var/lib/postgresql/server.key:ro
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    shm_size: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped

  duckdb-server:
    build: ./duckdb-server
    ports:
      - "4213:4213"
      - "9999:9999"
    environment:
      DAGSTER_PG_PASSWORD: ${DAGSTER_PG_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: "https://us.i.posthog.com"
      FASTMCP_STATELESS_HTTP: "true"
      DUCKDB_JE_MALLOC_CONF: "background_thread:true,dirty_decay_ms:30000,muzzy_decay_ms:30000,oversize_threshold:268435456"
    volumes:
      - lakevol:/data/common-ground
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4213/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 28G
        reservations:
          memory: 4G
    restart: unless-stopped

  duck-ui:
    image: ghcr.io/caioricciuti/duck-ui:latest  # TODO: pin to specific version
    ports:
      - "5522:5522"
    environment:
      DUCK_UI_EXTERNAL_CONNECTION_NAME: "Common Ground Lake"
      DUCK_UI_EXTERNAL_HOST: "http://duckdb-server"
      DUCK_UI_EXTERNAL_PORT: "8080"
      DUCK_UI_ALLOW_UNSIGNED_EXTENSIONS: "true"
    depends_on:
      - duckdb-server
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    restart: unless-stopped

  xyops:
    image: ghcr.io/pixlcore/xyops:latest
    ports:
      - "5580:5522"
    volumes:
      - xyops-data:/opt/xyops/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      XYOPS_secret_key: ${XYOPS_SECRET_KEY}
      XYOPS_base_app_url: "https://xyops.common-ground.nyc"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped

  pg-backup:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: ${DAGSTER_PG_PASSWORD}
    volumes:
      - /mnt/data/common-ground/backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[$(date)] Starting Postgres backup..."
          pg_dump -h postgres -U dagster ducklake | gzip > /backups/ducklake_$(date +%Y%m%d_%H%M%S).sql.gz
          find /backups -name "ducklake_*.sql.gz" -mtime +7 -delete
          echo "[$(date)] Backup complete. Sleeping 24h..."
          sleep 86400
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  xyops-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/common-ground/xyops
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/common-ground/pgdata
  lakevol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/data/common-ground
